services:
  
  nginx:
   image: nginx
   ports:
    - 8080:80
   volumes:
     - ./nginx/nginx.conf:/etc/nginx/nginx.conf 

  gateway1:
   build: ./backend/gateway
   env_file:
    - ./backend/gateway/.env
   environment:
    - PORT:3000
   ports:
    - 3000:3000
  gateway2:
   build: ./backend/gateway
   env_file:
      - ./backend/gateway/.env
   environment:
    - PORT:3000
   ports:
    - 3001:3000

  auth-service:
    build: ./backend/auth
    env_file:
      - ./backend/auth/.env
    ports:
     - 8000:8000  
  order-service:
    build: ./backend/order
    env_file:
      - ./backend/order/.env
    ports:
     - 8001:8001 
  product-service:
    build: ./backend/product
    env_file:
      - ./backend/product/.env
    ports:
     - 8002:8002